<header class="dn-header">
  <div class="dn-header-row">
    <a class="dn-brand" href="https://github.com/edchen1240/DirNav" target="_blank" rel="noopener noreferrer">DirNav</a>
    <input id="dn-search" class="dn-search" type="text" autocomplete="off"
           placeholder="Find a folder, file, url, or P00 ... e.g. p00 of mit">
    <button id="dn-open-weekly" class="btn-multi-function" type="button"
            title="Click: open latest weekly log in VSCode. Shift+click: open its folder. Ctrl+click: copy its path.">Latest Weekly</button>
    <button id="dn-open-manifest" class="btn-multi-function" type="button"
            title="Click: open projects.json in VSCode. Shift+click: open its folder. Ctrl+click: copy its path.">projects.json</button>
    <button id="dn-compile" class="btn-single-function" type="button"
            title="Run [B]_P01-Compile Dashboard.bat to regenerate index.html from projects.json.">Compile</button>
    <button id="dn-about" class="btn-plain" type="button"
            title="About DirNav. Shows the rendered content of about.md.">About</button>
  </div>
  <div class="dn-chips-row">
    <div id="dn-chips" class="dn-chips"></div>
    <label class="dn-toggle"><input type="checkbox" id="dn-hide-dim"> Hide parked</label>
    <button id="dn-reset" class="btn-plain" type="button">Reset</button>
  </div>
  <div id="dn-finder" class="dn-finder" hidden></div>
</header>
